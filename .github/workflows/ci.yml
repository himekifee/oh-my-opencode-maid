name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Fast feedback: types, unit tests, and a production build.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  # Real opencode binary + the built plugin, driven against a fake
  # OpenAI-compatible provider, asserting the reply is routed through the hidden
  # rewrite agent (configured model + variant + prompt). Same script as local:
  # `bun run e2e`.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # opencode CLI version under test. Keep in step with the @opencode-ai/sdk
      # the plugin bundles; bump together.
      OPENCODE_VERSION: "1.15.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install opencode
        run: |
          npm install -g "opencode-ai@${OPENCODE_VERSION}"
          opencode --version

      - name: Typecheck e2e harness
        run: bun run typecheck:e2e

      - name: E2E (opencode + plugin through the rewrite)
        run: bun run e2e
