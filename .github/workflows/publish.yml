name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # required for npm OIDC trusted publishing (auth + automatic provenance)

jobs:
  # Real opencode binary + the built plugin, driven against a fake
  # OpenAI-compatible provider, asserting the reply is routed through the hidden
  # rewrite agent (configured model + variant + prompt). Same script as local:
  # `bun run e2e`. Gates publish.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # opencode CLI version under test. Keep in step with the @opencode-ai/sdk
      # the plugin bundles; bump together.
      OPENCODE_VERSION: "1.15.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install opencode
        run: |
          npm install -g "opencode-ai@${OPENCODE_VERSION}"
          opencode --version

      - name: Typecheck e2e harness
        run: bun run typecheck:e2e

      - name: E2E (opencode + plugin through the rewrite)
        run: bun run e2e

  publish:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (=> ${TAG_VERSION}) does not match package.json version '${PKG_VERSION}'. Tag must be v<package.json version>, e.g. v${PKG_VERSION}."
            exit 1
          fi
          echo "Version OK: ${PKG_VERSION}"

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # Node 22 ships an npm older than 11.5.1; trusted publishing needs >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # No token and no --provenance: OIDC trusted publishing handles auth and
      # generates provenance automatically (requires a trusted publisher
      # configured on the npm package settings page).
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}} (#{{MERGE_SHA}})",
              "empty_template": "- no changes",
              "categories": [
                { "title": "## Changes", "labels": [], "rules": [{ "pattern": ".*", "on_property": "title" }] }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.changelog }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "$NOTES"
